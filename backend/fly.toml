app = "wpp-group-manager"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false # Keep machine alive to listen for WhatsApp messages
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Chromium headless + WhatsApp Web requires at least 4GB to avoid OOM kills
[vm]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2

[[mounts]]
  # This creates a persistent disk so your SQLite DB and WhatsApp session don't get wiped
  source = "wpp_data"
  destination = "/app/data"

